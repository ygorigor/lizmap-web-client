registration.subject=Activarea contului dvs. pe site-ul web %s
registration.body.html=<p>Salut,</p>\n\n<p>Ați creat un cont nou pe <a href="{$website_uri}" class="notexpandlink">{$domain_name}{$basePath}</a>.\n</p>\n\n<p>Înainte de a utiliza contul, ar trebui să confirmați înregistrarea prin \n<a href="{$confirmation_link}">apăsrea acestui link</a>. Link-ul este valid {$validationKeyTTL}.</p>\n\n<p>Ne vedem pe {$domain_name}{$basePath}!</p>
registration.admin.body.html=<p>Salut,</p>\n\n<p>Administratorul site-ului web <a href="{$website_uri}" class="notexpandlink">{$domain_name}{$basePath}</a>.\nv-a creat un cont, cu autentificarea <em>{$user->login}"</em>.</p>\n\n<p>Înainte de a utiliza contul, ar trebui să confirmați înregistrarea prin \n<a href="{$confirmation_link}">apăsrea acestui link</a>,\nindicând o nouă parolă. Link-ul este valid {$validationKeyTTL}.</p>\n\n<p>Ne vedem pe {$domain_name}{$basePath}!</p>
password.reset.subject=Resetați parola pe site-ul web %s
password.reset.body.html=<p>Salut,</p>\n\n<p>Ați solicitat o resetare a parolei pentru contul dvs. <em>"{$user->login|eschtml}"</em>\npe pagina web <a href="{$website_uri}" class="notexpandlink">{$domain_name}{$basePath}</a>.</p>\n\n<p>Dacă doriți cu adevărat să o schimbați, trebuie <a href="{$confirmation_link}">să faceți clic pe acest link</a>.</p>\n\n<p>Apoi, puteți seta o nouă parolă pentru contul dvs. Linkul este valid {$validationKeyTTL}.</p>\n\n<p>Dacă această solicitare este o eroare sau nu doriți să confirmați,\
ignoraţi acest e-mail.\nParola dvs. nu va fi schimbată.</p>\n\n<p>Ne vedem pe {$domain_name}{$basePath}!</p>
password.admin.reset.subject=Resetați parola pe site-ul web %s
password.admin.reset.body.html=<p>Salut,</p> \n\n<p>Administratorul paginii web <a href="{$website_uri}" class="notexpandlink">{$domain_name}{$basePath}</a> v-a trimis acest e-mail, ca să puteți schimba parola contului <em>"{$user->login}"</em>.</p>\n\n <p>Dacă doriți să confirmați modificarea, trebuie <a href="{$confirmation_link}">să faceți clic pe acest link</a>.</p>\n\n <p>Apoi, puteți seta o nouă parolă pentru contul dvs. Linkul este valid {$validationKeyTTL}.</p>\n <p>Dacă\
această solicitare este o eroare sau nu doriți să confirmați, ignoraţi acest e-mail,\n iar parola dvs. nu va fi schimbată.</p>\n\n <p>Ne vedem pe {$domain_name}{$basePath}!</p>
